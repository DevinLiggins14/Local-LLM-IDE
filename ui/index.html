<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Local LLM IDE</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="topbar">
    <span id="logo">⚡ Local LLM IDE</span>
    <button id="open-folder" title="Open a workspace folder">Open Folder</button>
    <span id="ws-path" title=""></span>
    <span class="spacer"></span>
    <label>Model <select id="model-select"></select></label>
    <label>Thinking
      <select id="think-select">
        <option value="">Non-think</option>
        <option value="high">Think High</option>
        <option value="max">Think Max</option>
      </select>
    </label>
    <label class="toggle" title="Let the model read/write files and run commands in the workspace">
      <input type="checkbox" id="agent-toggle" /> Agent
    </label>
  </div>

  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">EXPLORER</div>
      <div id="file-tree"></div>
    </div>
    <div id="editor-area">
      <div id="tabs"></div>
      <div id="editor"></div>
      <div id="editor-empty">Open a folder, then click a file — or just start chatting →</div>
    </div>
    <div id="chat-panel">
      <div id="chat-header">
        <span>DEEPSEEK V4 FLASH</span>
        <button id="clear-chat" title="Clear conversation">New chat</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <div id="context-chips"></div>
        <textarea id="chat-input" rows="3" placeholder="Ask DeepSeek… (Enter to send, Shift+Enter for newline)"></textarea>
        <div id="chat-buttons">
          <button id="attach-file" title="Attach the active editor file to your message">+ Active file</button>
          <button id="attach-selection" title="Attach the current editor selection">+ Selection</button>
          <span class="spacer"></span>
          <button id="stop-btn" class="hidden">Stop</button>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div id="statusbar"><span id="status-left">ready</span><span class="spacer"></span><span id="status-right"></span></div>

  <script src="/vendor/marked/marked.min.js"></script>
  <script src="/vendor/monaco/vs/loader.js"></script>
  <script src="/app.js"></script>
</body>
</html>
